name: Q2 UI Automation - BDD Tests

# REQUIREMENT: REQ-8 - CI/CD Pipeline
# Runs Selenium BDD tests in both Chrome and Firefox
# Triggered on push and pull request

on:
  push:
    branches: [ main, master ]
    paths:
      - 'q2_ui_automation_bdd/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'q2_ui_automation_bdd/**'
  # Manual trigger option
  workflow_dispatch:

jobs:
  bdd-tests:
    runs-on: ubuntu-latest
    
    # REQ-7: Test in both browsers
    strategy:
      fail-fast: false  # Don't cancel other jobs if one fails
      matrix:
        browser: [chrome, firefox]
    
    name: BDD Tests (${{ matrix.browser }})
    
    steps:
      # Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # Step 2: Setup Python
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      # Step 3: Install Chrome (for Chrome matrix)
      - name: Setup Chrome
        if: matrix.browser == 'chrome'
        uses: browser-actions/setup-chrome@latest
      
      # Step 4: Install Firefox (for Firefox matrix)
      - name: Setup Firefox
        if: matrix.browser == 'firefox'
        uses: browser-actions/setup-firefox@latest
      
      # Step 5: Install dependencies
      - name: Install Python dependencies
        working-directory: q2_ui_automation_bdd
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # Step 6: Run BDD tests
      - name: Run Behave tests
        working-directory: q2_ui_automation_bdd
        env:
          BROWSER: ${{ matrix.browser }}
        run: |
          # Run in headless mode for CI (no display)
          behave --no-capture --format pretty
      
      # Step 7: Upload test results
      - name: Upload output files
        if: always()  # Upload even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: word-frequency-results-${{ matrix.browser }}
          path: q2_ui_automation_bdd/output/
          retention-days: 7
