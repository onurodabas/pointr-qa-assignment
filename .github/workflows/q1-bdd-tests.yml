name: REST API BDD Tests

on:
  push:
    branches: [ main, master ]
    paths:
      - 'q1_rest_api_bdd/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'q1_rest_api_bdd/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: q1_rest_api_bdd
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run BDD tests
        working-directory: q1_rest_api_bdd
        run: behave --no-capture --format pretty

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: q1_rest_api_bdd/reports/
          retention-days: 7
